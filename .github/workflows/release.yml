name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-prep-release:
    if: github.event_name == 'workflow_dispatch' || github.event.release.tag_name == 'autodraft'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10
      - name: build and test
        run: |
          dotnet restore
          dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet test -c Release --no-build
      - name: prepare release
        id: prepare
        run: dotnet prepare-release.cs
      - name: commit, tag and push
        if: steps.prepare.outputs.bump_level != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ steps.prepare.outputs.new_version }}"
          git tag ${{ steps.prepare.outputs.new_version }}
          git push origin HEAD
          git push origin ${{ steps.prepare.outputs.new_version }}
      - name: create release and clean up draft
        if: steps.prepare.outputs.bump_level != '' && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.prepare.outputs.new_version }} \
            --title "${{ steps.prepare.outputs.new_version }}" \
            --notes-file "${{ steps.prepare.outputs.release_notes_file }}" \
            --latest
          gh release delete autodraft --yes
          git push origin :autodraft
      - name: create release
        if: steps.prepare.outputs.bump_level != '' && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.prepare.outputs.new_version }} \
            --title "${{ steps.prepare.outputs.new_version }}" \
            --notes-file "${{ steps.prepare.outputs.release_notes_file }}" \
            --latest
