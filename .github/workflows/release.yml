name: Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-test-prep-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10
      - name: build and test
        run: |
          dotnet restore
          dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet test -c Release --no-build
      - name: prepare release
        id: prepare
        run: dotnet prepare-release.cs
      - name: commit, tag and push
        if: steps.prepare.outputs.bump_level != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ steps.prepare.outputs.new_version }}"
          git tag ${{ steps.prepare.outputs.new_version }}
          git push origin HEAD
          git push origin ${{ steps.prepare.outputs.new_version }}
      - name: create github release
        if: steps.prepare.outputs.bump_level != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.prepare.outputs.new_version }} \
            --title "${{ steps.prepare.outputs.new_version }}" \
            --notes-file "${{ steps.prepare.outputs.release_notes_file }}" \
            --draft
