name: Release

on: [ workflow_dispatch ]

permissions:
  contents: write

jobs:
  build-test-prep-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.2.0
        with:
          token: ${{ github.token }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10
      - name: build and test
        run: |
          dotnet restore
          dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet test -c Release --no-build
      - name: prepare release
        id: prepare
        run: dotnet prepare-release.cs
      - name: commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ steps.prepare.outputs.new_version }}"
          git tag ${{ steps.prepare.outputs.new_version }}
          git push origin HEAD
          git push origin ${{ steps.prepare.outputs.new_version }}
      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.prepare.outputs.new_version }} \
            --title "${{ steps.prepare.outputs.new_version }}" \
            --notes-file "${{ steps.prepare.outputs.release_notes_file }}" \
            --draft
