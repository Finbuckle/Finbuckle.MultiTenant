name: AutoDraft Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  autodraft-release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.2.0
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10

      - name: build and test
        run: |
          dotnet restore
          dotnet build -c Release --no-restore -p:ContinuousIntegrationBuild=true
          dotnet test -c Release --no-build

      - name: prepare release
        id: prepare
        run: dotnet prepare-release.cs

      - name: update standing draft release
        if: steps.prepare.outputs.bump_level != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_TAG="autodraft"
          RELEASE_TITLE="${{ steps.prepare.outputs.new_version }}"
          RELEASE_NOTES_FILE="${{ steps.prepare.outputs.release_notes_file }}"

          if gh release view "$DRAFT_TAG" >/dev/null 2>&1; then
            gh release edit "$DRAFT_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --draft
          else
            gh release create "$DRAFT_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --draft
          fi
