name: Copy Docs to Website

on:
    workflow_call:
    workflow_dispatch:

permissions:
  contents: read

jobs:
  checkout-copy-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Finbuckle.MultiTenant
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0
        with:
          fetch-depth: 0
      - name: Get Current Version
        run: echo "tag=$(git describe --tags --abbrev=0 --match 'v*')" >> $GITHUB_ENV
      - name: Checkout Website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.2.0
        with:
          repository: Finbuckle/Website
          token: ${{ secrets.workflow_pat }}
          path: website
      - name: Copy Docs
        run: mkdir -p website/content/docs/${{ env.tag }} && cp docs/* website/content/docs/${{ env.tag }}
      - name: Checkin Website
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "chore: docs generated" && git push)
