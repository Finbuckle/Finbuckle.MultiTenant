name: Copy Docs to Website

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to copy docs from (for example, v10.1.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  checkout-copy-checkin:
    if: github.event_name == 'workflow_dispatch' || github.event.release.tag_name != 'autodraft'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Finbuckle.MultiTenant
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.2.0
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0
      - name: Get Current Version
        run: echo "tag=${{ github.event.release.tag_name || inputs.tag }}" >> $GITHUB_ENV
      - name: Checkout Website
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6.2.0
        with:
          repository: Finbuckle/Website
          token: ${{ secrets.workflow_pat }}
          path: website
      - name: Copy Docs
        run: mkdir -p website/content/docs/${{ env.tag }} && cp docs/* website/content/docs/${{ env.tag }}
      - name: Checkin Website
        working-directory: website
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "chore: docs generated" && git push)
